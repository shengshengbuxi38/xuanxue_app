name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.6'

      - name: Get dependencies
        run: flutter pub get

      # Install signing certificate
      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Install provisioning profile
      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH
          # Extract UUID and rename profile (Xcode requires UUID filename)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i $PP_PATH)")
          cp $PP_PATH "$PP_DIR/$UUID.mobileprovision"
          echo "Installed profile: $UUID"

      # Build iOS (Flutter compile + Xcode build without signing)
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # Get certificate identity
      - name: Get signing identity
        run: |
          security find-identity -v -p codesigning
          # Use the Apple Distribution identity
          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Using identity: $IDENTITY"

      # Extract entitlements and sign the .app
      - name: Extract entitlements
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PP_FILE=$(ls "$PP_DIR/"*.mobileprovision | head -1)
          security cms -D -i "$PP_FILE" > /tmp/profile_decoded.plist
          python3 -c "import plistlib; p=plistlib.load(open('/tmp/profile_decoded.plist','rb')); plistlib.dump(p.get('Entitlements',{}), open('/tmp/entitlements.plist','wb'))"

      - name: Sign app
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          codesign --force --sign "$IDENTITY" --entitlements /tmp/entitlements.plist \
            --keychain $RUNNER_TEMP/app-signing.keychain-db "$APP_PATH"
          echo "App signed successfully"

      # Package IPA manually
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r -9 ../Runner.ipa Payload
          echo "IPA created: build/ios/Runner.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/Runner.ipa
          retention-days: 7

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-IPA
          path: build/ios/ipa/*.ipa
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
